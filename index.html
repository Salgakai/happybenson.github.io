<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>技術文件中心</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f4f6f9; color: #1a2233; }
  header { background: #1a2a4a; color: #fff; padding: 40px 24px 32px; text-align: center; }
  header h1 { font-size: 2rem; font-weight: 700; }
  header p { margin-top: 8px; color: #a8bedc; font-size: .95rem; max-width: 520px; margin-inline: auto; }
  .toolbar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; max-width: 1100px; margin: 24px auto 0; padding: 0 24px; }
  .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; }
  .filter-btn { padding: 6px 16px; border-radius: 20px; border: 1.5px solid #c5d0e0; background: #fff; color: #3a5070; font-size: .85rem; cursor: pointer; transition: all .2s; }
  .filter-btn:hover, .filter-btn.active { background: #1a5fa8; color: #fff; border-color: #1a5fa8; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 22px; max-width: 1100px; margin: 20px auto 60px; padding: 0 24px; }
  .card { background: #fff; border-radius: 10px; border: 1px solid #dce4ef; padding: 24px; display: flex; flex-direction: column; gap: 12px; transition: box-shadow .2s, transform .2s; }
  .card:hover { box-shadow: 0 6px 24px rgba(26,90,168,.13); transform: translateY(-3px); }
  .card-tag { display: inline-block; font-size: .75rem; font-weight: 600; padding: 3px 10px; border-radius: 12px; background: #e6f0fb; color: #1a5fa8; width: fit-content; }
  .card h3 { font-size: 1.05rem; font-weight: 700; color: #1a2233; line-height: 1.4; }
  .card p { font-size: .875rem; color: #5a6e85; line-height: 1.6; flex: 1; }
  .card a { display: inline-flex; align-items: center; gap: 6px; margin-top: 4px; padding: 8px 16px; background: #1a5fa8; color: #fff; border-radius: 6px; font-size: .85rem; font-weight: 600; text-decoration: none; width: fit-content; transition: background .2s; }
  .card a:hover { background: #154d8a; }
  .status { text-align: center; padding: 60px 0; color: #8a9ab0; font-size: .95rem; grid-column: 1/-1; }
  .status.error { color: #c0392b; }
  .spinner { width: 32px; height: 32px; border: 3px solid #dce4ef; border-top-color: #1a5fa8; border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  footer { text-align: center; padding: 24px; font-size: .8rem; color: #8a9ab0; border-top: 1px solid #dce4ef; background: #fff; }
</style>
</head>
<body>

<header>
  <h1>📚 技術文件中心</h1>
  <p>整理所有教學指南與技術資源，快速找到你需要的文件。</p>
</header>

<div class="toolbar">
  <div class="filter-bar" id="filterBar"></div>
</div>

<div class="grid" id="grid">
  <div class="status"><div class="spinner"></div>載入文件中…</div>
</div>

<footer>© 2026 技術文件中心 · 持續更新中</footer>

<script>
  // ⚙️ 將下面這行換成你自己的 GitHub raw JSON 網址
  const JSON_URL = 'https://github.com/Salgakai/happybenson.github.iomain/docs.json';

  let docs = [], activeFilter = 'all';

  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function renderFilters() {
    const tags = ['全部', ...new Set(docs.map(d => d.tag))];
    document.getElementById('filterBar').innerHTML = tags.map(t => {
      const val = t === '全部' ? 'all' : t;
      return `<button class="filter-btn ${activeFilter === val ? 'active' : ''}" onclick="setFilter('${val}',this)">${t}</button>`;
    }).join('');
  }

  function setFilter(tag) {
    activeFilter = tag;
    renderFilters();
    renderGrid();
  }

  function renderGrid() {
    const filtered = activeFilter === 'all' ? docs : docs.filter(d => d.tag === activeFilter);
    const grid = document.getElementById('grid');
    if (!filtered.length) {
      grid.innerHTML = '<p class="status">沒有符合的文件。</p>';
      return;
    }
    grid.innerHTML = filtered.map(d => `
      <div class="card">
        <span class="card-tag">${esc(d.tag)}</span>
        <h3>${esc(d.title)}</h3>
        <p>${esc(d.desc)}</p>
        <a href="${esc(d.url)}" target="_blank">閱讀文件
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </a>
      </div>`).join('');
  }

  async function loadDocs() {
    try {
      const res = await fetch(JSON_URL + '?t=' + Date.now());
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      docs = await res.json();
      renderFilters();
      renderGrid();
    } catch (e) {
      document.getElementById('grid').innerHTML =
        `<p class="status error">⚠️ 無法載入文件資料，請確認 JSON_URL 設定是否正確。<br><small>${e.message}</small></p>`;
    }
  }

  loadDocs();
</script>
</body>
</html>
